<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>CYBER//HUB — НАГРЕВ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050509;--s1:#0a0a18;--s2:#0f0f22;--s3:#14142e;--border:#1c1c40;
  --cyan:#00e5ff;--magenta:#ff0090;--yellow:#ffe600;--green:#00ff9f;
  --text:#c0d8f0;--muted:#3a4a6a;
  --font-head:'Orbitron',monospace;--font-mono:'Share Tech Mono',monospace;
  --glow-c:0 0 8px var(--cyan),0 0 20px rgba(0,229,255,.3);
  --glow-m:0 0 8px var(--magenta),0 0 20px rgba(255,0,144,.3);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font-mono);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;position:relative;padding-bottom:env(safe-area-inset-bottom);-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:30px 30px}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px)}
.corner{position:fixed;width:60px;height:60px;pointer-events:none;z-index:2}
.corner-tl{top:12px;left:12px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);box-shadow:var(--glow-c)}
.corner-tr{top:12px;right:12px;border-top:2px solid var(--magenta);border-right:2px solid var(--magenta);box-shadow:var(--glow-m)}
.corner-bl{bottom:12px;left:12px;border-bottom:2px solid var(--magenta);border-left:2px solid var(--magenta);box-shadow:var(--glow-m)}
.corner-br{bottom:12px;right:12px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);box-shadow:var(--glow-c)}

#page{position:relative;z-index:3;max-width:1200px;margin:0 auto;padding:16px 8px 80px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}

header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.back-btn{font-family:var(--font-head);font-size:.6rem;letter-spacing:2px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:4px;transition:all .2s;flex-shrink:0}
.back-btn:hover{color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-c)}
.header-title{font-family:var(--font-head);font-size:clamp(1rem,4vw,1.6rem);font-weight:700;color:var(--magenta);text-shadow:0 0 15px var(--magenta);letter-spacing:3px;flex:1;text-align:center}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:6px}
.stat-chip{font-family:var(--font-head);font-size:.6rem;letter-spacing:1px;color:var(--muted);padding:3px 8px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
.stat-chip b{color:var(--cyan)}
.btn{font-family:var(--font-head);font-size:.65rem;font-weight:600;letter-spacing:1.5px;padding:8px 14px;border:none;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-magenta{background:transparent;color:var(--magenta);border:1px solid var(--magenta)}
.btn-magenta:hover{background:rgba(255,0,144,.1)}
.btn-cyan{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
.btn-cyan:hover{background:rgba(0,229,255,.1)}
.btn-green{background:transparent;color:var(--green);border:1px solid var(--green);box-shadow:0 0 6px rgba(0,255,159,.2)}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}
.score-filter{min-width:70px;font-family:var(--font-head);font-size:.6rem;background:var(--s2);color:var(--cyan);border:1px solid var(--cyan);border-radius:4px;padding:6px 8px;outline:none}
.score-filter:focus{border-color:var(--cyan);box-shadow:var(--glow-c)}

.tag{display:inline-block;font-size:.6rem;letter-spacing:.5px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:2px 6px;border-radius:3px;margin:1px;transition:color .15s,border-color .15s;cursor:default;white-space:nowrap}
.tag:hover{color:var(--cyan);border-color:var(--cyan)}
.tag.explicit{color:var(--magenta);border-color:rgba(255,0,144,.4)}
.tag.safe{color:var(--green);border-color:rgba(0,255,159,.3)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}}
@media(max-width:380px){.grid{grid-template-columns:repeat(2,1fr);gap:6px}}

.card{background:var(--s1);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;position:relative}
.card:hover{border-color:var(--magenta);box-shadow:var(--glow-m);transform:translateY(-2px)}
.card-img-wrap{position:relative;overflow:hidden;aspect-ratio:4/3;background:var(--s2)}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-img{transform:scale(1.03)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,9,.85) 0%,transparent 60%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:8px;flex-wrap:wrap;gap:3px}
.card:hover .card-overlay{opacity:1}
.score-badge{position:absolute;top:6px;right:6px;background:rgba(5,5,9,.8);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:var(--font-head);font-size:.55rem;color:var(--yellow);letter-spacing:1px;backdrop-filter:blur(4px)}
.rating-badge{position:absolute;top:6px;left:6px;background:rgba(5,5,9,.8);border:1px solid;border-radius:4px;padding:2px 5px;font-family:var(--font-head);font-size:.55rem;letter-spacing:1px;backdrop-filter:blur(4px)}
.rating-badge.s{color:var(--green);border-color:var(--green)}
.rating-badge.q{color:var(--yellow);border-color:var(--yellow)}
.rating-badge.e{color:var(--magenta);border-color:var(--magenta)}

.tags-wrap{padding:6px 8px;display:flex;flex-wrap:wrap;gap:2px}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.93);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-direction:column;align-items:center;overflow-y:auto;padding:16px 8px}
#lightbox.active{display:flex}
.lb-top{display:flex;align-items:center;gap:10px;width:100%;max-width:900px;margin-bottom:12px;flex-wrap:wrap}
.lb-close{font-family:var(--font-head);font-size:.65rem;letter-spacing:2px;color:var(--magenta);border:1px solid var(--magenta);background:transparent;padding:8px 14px;border-radius:4px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.lb-close:hover{background:rgba(255,0,144,.1)}
.lb-score{font-family:var(--font-head);font-size:.7rem;letter-spacing:1px;color:var(--yellow);padding:6px 12px;border:1px solid var(--yellow);border-radius:4px}
.lb-author{font-family:var(--font-head);font-size:.6rem;letter-spacing:1px;color:var(--muted);margin-left:auto}
.lb-img-wrap{flex:1;width:100%;max-width:900px;max-height:70vh;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center}
.lb-img{max-width:100%;max-height:70vh;object-fit:contain;display:block}
.lb-tags{display:flex;flex-wrap:wrap;gap:4px;width:100%;max-width:900px;padding:10px 0;max-height:120px;overflow-y:auto}
.lb-info{width:100%;max-width:900px;display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}

/* LOAD MORE */
.load-more-wrap{display:flex;justify-content:center;padding:20px;gap:12px;flex-wrap:wrap}
.load-more-wrap.hidden{display:none}
.btn-load{font-family:var(--font-head);font-size:.7rem;letter-spacing:2px;padding:12px 24px;border:1px solid var(--cyan);color:var(--cyan);background:transparent;border-radius:4px;cursor:pointer;transition:all .2s}
.btn-load:hover{background:rgba(0,229,255,.1);box-shadow:var(--glow-c)}
.btn-load:active{transform:scale(.96)}
.loading-msg{color:var(--muted);font-size:.8rem;letter-spacing:2px;padding:20px;text-align:center}
.empty-msg{color:var(--muted);font-size:.85rem;letter-spacing:1px;padding:40px 20px;text-align:center;line-height:1.6}
.error-msg{color:var(--magenta);font-size:.8rem;letter-spacing:1px;padding:20px;text-align:center;border:1px solid rgba(255,0,144,.3);border-radius:6px;margin:10px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(max-width:480px){
  .corner{display:none}
  header{padding-bottom:12px;margin-bottom:12px}
  .header-title{font-size:.95rem}
  .back-btn{font-size:.55rem;padding:5px 8px}
  .top-bar{padding:8px}
  .stat-chip{font-size:.55rem}
  .btn{font-size:.6rem;padding:6px 10px}
  .lb-img{max-height:55vh}
  .lb-img-wrap{max-height:55vh}
}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="page">
  <header>
    <a class="back-btn" href="index.html">← HUD</a>
    <div class="header-title">НАГРЕВ</div>
  </header>

  <div class="top-bar">
    <div class="stat-chip">СТРАНИЦА: <b id="cur-page">0</b></div>
    <div class="stat-chip">ПОКАЗАНО: <b id="cur-count">0</b></div>
    <div class="stat-chip">ВСЕГО: <b id="cur-total">—</b></div>
    <input class="score-filter" id="score-min" type="number" min="0" value="0" placeholder="мин.очки"/>
    <button class="btn btn-cyan" id="btn-refresh">ОБНОВИТЬ</button>
    <button class="btn btn-magenta" id="btn-apply-filter">ФИЛЬТР</button>
    <div class="spinner" id="top-spinner" style="display:none"></div>
  </div>

  <div id="grid" class="grid"></div>
  <div id="load-more-wrap" class="load-more-wrap hidden">
    <button class="btn-load" id="btn-load-more">ЗАГРУЗИТЬ ЕЩЁ</button>
  </div>
  <div id="loading-msg" class="loading-msg" style="display:none">ЗАГРУЗКА...</div>
  <div id="error-msg" class="error-msg" style="display:none"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-top">
    <button class="lb-close" id="lb-close">ЗАКРЫТЬ</button>
    <span class="lb-score" id="lb-score"></span>
    <span class="lb-author" id="lb-author"></span>
  </div>
  <div class="lb-img-wrap">
    <img class="lb-img" id="lb-img" src="" alt=""/>
  </div>
  <div class="lb-tags" id="lb-tags"></div>
  <div class="lb-info">
    <button class="lb-close" id="lb-close2">ЗАКРЫТЬ</button>
  </div>
</div>

<script>
(function(){
  var pid = 0;
  var limit = 24;
  var scoreMin = 50;
  var loading = false;
  var allPosts = [];
  var filteredPosts = [];
  var displayedCount = 0;
  var AUTO_REFRESH_MS = 30000;
  var autoTimer = null;

  var grid = document.getElementById('grid');
  var loadMoreWrap = document.getElementById('load-more-wrap');
  var loadingMsg = document.getElementById('loading-msg');
  var errorMsg = document.getElementById('error-msg');
  var topSpinner = document.getElementById('top-spinner');
  var scoreMinInput = document.getElementById('score-min');
  var lightbox = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbScore = document.getElementById('lb-score');
  var lbAuthor = document.getElementById('lb-author');
  var lbTags = document.getElementById('lb-tags');

  function setLoading(v){
    loading = v;
    loadingMsg.style.display = v ? 'block' : 'none';
    topSpinner.style.display = v ? 'block' : 'none';
    document.getElementById('btn-load-more').disabled = v;
    document.getElementById('btn-refresh').disabled = v;
  }

  function setError(msg){
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
  }

  function applyFilter(){
    scoreMin = parseInt(scoreMinInput.value) || 0;
    renderGrid(true);
  }

  function renderGrid(reset){
    if(reset){
      grid.innerHTML = '';
      displayedCount = 0;
    }
    var toShow = filteredPosts.slice(displayedCount, displayedCount + limit);
    toShow.forEach(function(post){
      var card = document.createElement('div');
      card.className = 'card';
      card.dataset.idx = allPosts.indexOf(post);
      var r = post.rating || 'q';
      var rLabel = {s:'SFW',q:'Q',e:'NSFW'}[r] || r.toUpperCase();
      card.innerHTML =
        '<div class="card-img-wrap">'+
          '<img class="card-img" data-src="'+esc(post.sampleUrl || post.previewUrl)+'" alt="" loading="lazy"/>'+
          '<div class="score-badge">'+esc(post.score)+'</div>'+
          '<div class="rating-badge '+r+'">'+esc(rLabel)+'</div>'+
          '<div class="card-overlay"></div>'+
        '</div>'+
        '<div class="tags-wrap" id="tags-'+post.id+'"></div>';
      grid.appendChild(card);

      // Lazy load
      var img = card.querySelector('.card-img');
      if(img.dataset.src){
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }

      // Render tags (show first 6)
      var tagWrap = card.querySelector('.tags-wrap');
      var tags = (post.tags||'').split(' ').filter(Boolean).slice(0,6);
      tags.forEach(function(t){
        var span = document.createElement('span');
        span.className = 'tag'+(r==='e'&&t.length>10?' explicit':'');
        span.textContent = t;
        tagWrap.appendChild(span);
      });
      if(tags.length > 6){
        var more = document.createElement('span');
        more.className = 'tag';
        more.textContent = '...'+(post.tags.split(' ').filter(Boolean).length-6)+' тегов';
        tagWrap.appendChild(more);
      }

      card.addEventListener('click', function(){ openLightbox(post); });
    });
    displayedCount += toShow.length;
    document.getElementById('cur-count').textContent = displayedCount;
    loadMoreWrap.classList.toggle('hidden', displayedCount >= filteredPosts.length);
  }

  function openLightbox(post){
    lbImg.src = post.fileUrl || post.sampleUrl || post.previewUrl || '';
    lbScore.textContent = 'SCORE: ' + post.score;
    lbAuthor.textContent = 'by ' + (post.author || '—');
    lbTags.innerHTML = '';
    var tags = (post.tags||'').split(' ').filter(Boolean);
    tags.forEach(function(t){
      var span = document.createElement('span');
      span.className = 'tag'+(post.rating==='e'&&t.length>10?' explicit':'');
      span.textContent = t;
      lbTags.appendChild(span);
    });
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(){
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-close2').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e){
    if(e.target === lightbox) closeLightbox();
  });

  function fetchPage(p, force){
    setLoading(true);
    setError('');
    var url = '/api/booru?pid=' + p + '&limit=' + limit;
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        allPosts = data.posts || [];
        allPosts.sort(function(a,b){ return (b.score||0) - (a.score||0); });
        filteredPosts = allPosts.filter(function(post){ return (post.score||0) >= scoreMin; });
        document.getElementById('cur-page').textContent = p;
        document.getElementById('cur-total').textContent = filteredPosts.length;
        renderGrid(true);
        if(filteredPosts.length === 0 && allPosts.length > 0){
          setError('Нет постов с score ≥ ' + scoreMin + '. Попробуй понизить фильтр.');
        } else {
          setError('');
        }
        setLoading(false);
      })
      .catch(function(e){
        setLoading(false);
        setError('Ошибка загрузки: ' + e.message);
      });
  }

  document.getElementById('btn-refresh').addEventListener('click', function(){
    scoreMin = parseInt(scoreMinInput.value) || 0;
    fetchPage(0, true);
  });

  document.getElementById('btn-apply-filter').addEventListener('click', applyFilter);

  scoreMinInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') applyFilter();
  });

  document.getElementById('btn-load-more').addEventListener('click', function(){
    if(loading) return;
    renderGrid(false);
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeLightbox();
  });

  function startAutoRefresh(){
    clearInterval(autoTimer);
    autoTimer = setInterval(function(){
      if(!lightbox.classList.contains('active') && !loading){
        fetchPage(0, true);
      }
    }, AUTO_REFRESH_MS);
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Init
  fetchPage(0, true);
  startAutoRefresh();
})();
</script>
</body>
</html>
